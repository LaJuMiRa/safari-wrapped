name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: npm run build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (popup + wrapped)
        run: npm run build
